name: datametl

services:
  app-postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${APP_DB_USER:-datametl}
      POSTGRES_PASSWORD: ${APP_DB_PASSWORD:-datametl}
      POSTGRES_DB: ${APP_DB_NAME:-datametl}
    ports:
      - "5433:5432"
    volumes:
      - app-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${APP_DB_USER:-datametl} -d ${APP_DB_NAME:-datametl}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      app-postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
    ports:
      - "8001:8000"
    volumes:
      - ../backend:/app
      - /app/.venv

  worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      app-postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    # `--watch /app/app` reloads the worker when Python files change. Requires watchfiles
    # (declared in backend/pyproject.toml).
    command: ["arq", "--watch", "/app/app", "app.jobs.worker.WorkerSettings"]
    volumes:
      - ../backend:/app
      - /app/.venv

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      target: dev
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    ports:
      - "3005:3000"
    volumes:
      - ../frontend:/app
      - /app/node_modules
      - /app/.next

volumes:
  app-postgres-data:
  redis-data:
